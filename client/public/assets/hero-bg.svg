
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#4A0E17" />
      <stop offset="100%" stop-color="#050C1A" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E8D1" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />
  
  <!-- Outer luxury border -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.3" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.15" />
  
  <!-- Corner designs -->
  <path d="M 20 60 L 20 20 L 60 20" fill="none" stroke="url(#gold-grad)" stroke-width="3" />
  <path d="M 780 60 L 780 20 L 740 20" fill="none" stroke="url(#gold-grad)" stroke-width="3" />
  <path d="M 20 540 L 20 580 L 60 580" fill="none" stroke="url(#gold-grad)" stroke-width="3" />
  <path d="M 780 540 L 780 580 L 740 580" fill="none" stroke="url(#gold-grad)" stroke-width="3" />

  <!-- Center Graphic -->
  <g transform="translate(400, 270)">
    
      <!-- Mandala pattern -->
      <circle cx="0" cy="0" r="150" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.2" />
      <circle cx="0" cy="0" r="100" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.4" />
      <circle cx="0" cy="0" r="50" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.6" />
      
      <!-- Crown in center -->
      <path d="M -40 20 L -50 -20 L -20 -5 L 0 -30 L 20 -5 L 50 -20 L 40 20 Z" fill="url(#gold-grad)" filter="url(#glow)" opacity="0.85" />
      <circle cx="0" cy="-35" r="5" fill="#F4E8D1" />
      <circle cx="-53" cy="-25" r="4" fill="#F4E8D1" />
      <circle cx="53" cy="-25" r="4" fill="#F4E8D1" />
      
      <!-- Sunburst spokes -->
      <g opacity="0.25">
        
          <line x1="0" y1="0" x2="180" y2="0" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="166.2983158520316" y2="68.88301782571617" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="127.27922061357856" y2="127.27922061357854" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="68.88301782571617" y2="166.2983158520316" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="1.1021821192326179e-14" y2="180" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-68.88301782571615" y2="166.2983158520316" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-127.27922061357854" y2="127.27922061357856" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-166.2983158520316" y2="68.88301782571618" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-180" y2="2.2043642384652358e-14" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-166.29831585203164" y2="-68.88301782571614" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-127.27922061357859" y2="-127.27922061357854" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-68.88301782571627" y2="-166.29831585203158" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="-3.3065463576978534e-14" y2="-180" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="68.8830178257162" y2="-166.2983158520316" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="127.27922061357852" y2="-127.27922061357859" stroke="url(#gold-grad)" stroke-width="1" />
        
          <line x1="0" y1="0" x2="166.29831585203158" y2="-68.88301782571627" stroke="url(#gold-grad)" stroke-width="1" />
        
      </g>
    
  </g>

  <!-- Title Text -->
  <text x="400" y="520" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="28" font-weight="bold" fill="url(#gold-grad)" letter-spacing="4" filter="url(#glow)">
    THE ROYAL COURT
  </text>
  <text x="400" y="550" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="10" font-weight="light" fill="#F4E8D1" opacity="0.6" letter-spacing="3">
    URBAN MAHARAJA FINE DINING
  </text>
</svg>
